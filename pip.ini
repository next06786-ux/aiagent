[global]
# 使用清华大学镜像（推荐，速度最快）
index-url = https://pypi.tsinghua.edu.cn/simple

# 备用镜像源
extra-index-url = 
    https://mirrors.aliyun.com/pypi/simple/
    https://pypi.org/simple/

[install]
# 信任的主机
trusted-host = 
    pypi.tsinghua.edu.cn
    mirrors.aliyun.com
    pypi.org

# 超时时间（秒）
timeout = 120










