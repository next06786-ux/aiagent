version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: lifeswarm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --max_connections=100
    networks:
      - lifeswarm-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: lifeswarm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - lifeswarm-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Neo4j图数据库
  neo4j:
    image: neo4j:5.12-community
    container_name: lifeswarm-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - lifeswarm-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lifeswarm-backend
    restart: unless-stopped
    environment:
      # 数据库配置
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Neo4j配置
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      
      # LLM配置
      LLM_PROVIDER: ${LLM_PROVIDER}
      QWEN_API_KEY: ${QWEN_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      
      # 其他配置
      ENABLE_LOCAL_MODEL: "false"
      HF_HUB_OFFLINE: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - faiss_data:/app/faiss_indexes
      - persona_memories:/app/backend/data/persona_memories
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      - mysql
      - redis
      - neo4j
    networks:
      - lifeswarm-network
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M

  # 前端服务（已禁用，只部署后端）
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.frontend
  #   container_name: lifeswarm-frontend
  #   restart: unless-stopped
  #   environment:
  #     VITE_API_BASE_URL: http://152.136.13.236:8000
  #     VITE_WS_BASE_URL: ws://152.136.13.236:8000
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - backend
  #   networks:
  #     - lifeswarm-network
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M
  #       reservations:
  #         memory: 128M

volumes:
  mysql_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  faiss_data:
  persona_memories:
  huggingface_cache:

networks:
  lifeswarm-network:
    driver: bridge
