version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: lifeswarm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: lifeswarm
      MYSQL_USER: lifeswarm
      MYSQL_PASSWORD: lifeswarm123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lifeswarm-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j图数据库
  neo4j:
    image: neo4j:5.12
    container_name: lifeswarm-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/lifeswarm123
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - lifeswarm-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "lifeswarm123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lifeswarm-backend
    restart: unless-stopped
    environment:
      # 数据库配置
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: lifeswarm
      MYSQL_PASSWORD: lifeswarm123
      MYSQL_DATABASE: lifeswarm
      
      # Neo4j配置
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: lifeswarm123
      
      # LLM配置
      LLM_PROVIDER: qwen
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      
      # 其他配置
      LIFESWARM_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 6006
    ports:
      - "6006:6006"
    volumes:
      # 挂载整个后端目录，支持热重载
      - ./backend:/app/backend
      - ./backend/data:/app/backend/data
      - ./models:/app/models
      - ./.env:/app/.env
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - lifeswarm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lifeswarm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lifeswarm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  lifeswarm-network:
    driver: bridge

volumes:
  mysql_data:
  neo4j_data:
  neo4j_logs:
